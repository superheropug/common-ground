version: "3.9"

services:
  db:
    image: postgres:16
    container_name: pg
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: common-ground-api
    container_name: api
    expose:
      - "5000"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/appdb
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: secret
      SERVER_PORT: 5000
    networks:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./Website
      dockerfile: Dockerfile
    image: common-ground-frontend
    container_name: frontend
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - frontend
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:

networks:
  frontend:
  backend: