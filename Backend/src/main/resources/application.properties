# Datasource configuration - replace with your DB settings
spring.datasource.url=jdbc:postgresql://localhost:5432/appdb
spring.datasource.username=app
spring.datasource.password=secret
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Set default schema to COMMON_GROUND so the entity maps to COMMON_GROUND.USERS
spring.jpa.properties.hibernate.default_schema=COMMON_GROUND

server.port=5000

