services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - pgdata:/var/lib/postgresql/data

  api:
    image: common-ground-api
    ports:
      - "5000:5000"

  frontend:
    image: common-ground-frontend
    ports:
      - "3000:80"

volumes:
  pgdata: