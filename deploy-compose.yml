version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
    restart: unless-stopped

  api:
    image: common-ground-api
    expose:
      - "5000"
    depends_on:
      - db
    networks:
      - appnet
    restart: unless-stopped

  frontend:
    image: common-ground-frontend
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - appnet
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - appnet
    restart: unless-stopped

volumes:
  pgdata:

networks:
  appnet: